<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="30">
<title>Semáforo Atrasos RM — Laboratorio Blanco</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:     #1C2149;
    --blue:     #1D2C93;
    --blue-lt:  #E1E7FF;
    --surface:  #F7F8FC;
    --border:   #DDE2EF;
    --text:     #1E293B;
    --dim:      #94A3B8;
    --white:    #FFFFFF;
    --bg:       #F0F2F8;
    --green-bg: #E8F5EE; --green:  #2E7D51;
    --yel-bg:   #FEF8E7; --yellow: #8A6A00;
    --red-bg:   #FDECEA; --red:    #B94040;
    --gray-bg:  #F0F2F8; --gray:   #94A3B8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── TOPBAR ── */
  .topbar {
    background: var(--navy);
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(28,33,73,0.18);
  }

  .brand {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    color: rgba(255,255,255,.9);
  }

  .brand span { color: rgba(255,255,255,.3); font-weight: 400; margin: 0 8px; }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: rgba(255,255,255,.35);
    letter-spacing: .06em;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #2E7D51;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* ── WRAP ── */
  .wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 44px 28px 72px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 36px;
  }

  .page-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 8px;
  }

  .page-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--navy);
    letter-spacing: -.02em;
    margin-bottom: 6px;
  }

  .page-sub {
    font-size: 12px;
    font-weight: 500;
    color: var(--dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 28px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: 14px;
    border: 1px solid var(--border);
    border-left: 5px solid var(--border);
    padding: 32px 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 2px 12px rgba(28,33,73,0.05);
    animation: up .45s ease both;
    transition: box-shadow .2s;
  }

  .card:hover { box-shadow: 0 6px 24px rgba(28,33,73,0.1); }

  @keyframes up {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .card:nth-child(1) { animation-delay: .05s; }
  .card:nth-child(2) { animation-delay: .12s; }
  .card:nth-child(3) { animation-delay: .19s; }

  /* Card header */
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-sala {
    font-size: 28px;
    font-weight: 900;
    letter-spacing: -.01em;
    color: var(--navy);
    line-height: 1;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
  }

  /* Card value */
  .card-value-row {
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .card-value {
    font-size: 80px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -.04em;
    color: var(--navy);
  }

  .card-unit {
    font-size: 18px;
    font-weight: 500;
    color: var(--dim);
    padding-bottom: 12px;
  }

  /* Card footer */
  .card-footer {
    border-top: 1px solid #F0F2F8;
    padding-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .card-status {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .card-ts {
    font-size: 10px;
    color: var(--dim);
    font-weight: 500;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 28px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 16px 28px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 20px;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
  }

  .leg-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
  }

  /* ── REFRESH BTN ── */
  .btn {
    display: block;
    margin: 0 auto;
    background: var(--navy);
    color: var(--white);
    border: none;
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: background .2s, transform .1s;
  }

  .btn:hover  { background: var(--blue); }
  .btn:active { transform: scale(.98); }

  /* ── ERROR ── */
  .error-box {
    background: var(--white);
    border: 1px solid var(--border);
    border-left: 5px solid var(--red);
    border-radius: 14px;
    padding: 40px;
    text-align: center;
    color: var(--dim);
    font-size: 13px;
    grid-column: 1 / -1;
  }

  /* ── LOADING ── */
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    Laboratorio Blanco <span>·</span> Jefatura de Imágenes
  </div>
  <div class="topbar-right">
    <div class="live-dot"></div>
    Actualización automática cada 30s
  </div>
</div>

<!-- CONTENIDO -->
<div class="wrap">

  <div class="page-header">
    <div class="page-label">Resonancia Magnética</div>
    <div class="page-title">Semáforo de Atrasos</div>
    <div class="page-sub" id="lastRead">Cargando datos...</div>
  </div>

  <div class="grid" id="grid">
    <div style="grid-column:1/-1;text-align:center;padding:60px">
      <div class="spinner"></div>
      <div style="font-size:12px;color:var(--dim);font-weight:500">Conectando con la hoja de datos...</div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#2E7D51"></div>Sin atraso &lt; 20 min</div>
    <div class="leg-item"><div class="leg-dot" style="background:#8A6A00"></div>Atraso moderado 20 – 40 min</div>
    <div class="leg-item"><div class="leg-dot" style="background:#B94040"></div>Atraso crítico &gt; 40 min</div>
  </div>

  <button class="btn" onclick="location.reload()">↺ &nbsp; Actualizar ahora</button>

</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
const SHEET_ID   = '1noHtMRHY5ZsTczr1kxfNERK3rLmlyPOxhGoqZUkUdyU';
const SHEET_NAME = 'Registro';
const SALAS = [
  { key: 'M2', label: 'RM 2' },
  { key: 'M3', label: 'RM 3' },
  { key: 'M4', label: 'RM 4' },
];
const UMBRAL_VERDE    = 20;
const UMBRAL_AMARILLO = 40;

// ── FETCH CSV ─────────────────────────────────────────────
function csvUrl() {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
}

async function fetchCSV() {
  const res = await fetch(csvUrl());
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.text();
}

function parseCSV(text) {
  return text.trim().split('\n').map(line => {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { fields.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    fields.push(cur.trim());
    return fields;
  });
}

function buildMap(rows) {
  if (!rows || rows.length < 2) return null;
  const header = rows[0].map(h => h.toLowerCase());
  const iTs  = header.findIndex(h => h.includes('marca') || h.includes('timestamp'));
  const iRM  = header.findIndex(h => h === 'rm' || h.includes('equipo') || h.includes('sala'));
  const iMin = header.findIndex(h => h.includes('minuto') || h.includes('atraso'));

  const colTs  = iTs  >= 0 ? iTs  : 0;
  const colRM  = iRM  >= 0 ? iRM  : 1;
  const colMin = iMin >= 0 ? iMin : 2;

  const map = {};
  for (let i = rows.length - 1; i >= 1; i--) {
    const row  = rows[i];
    const sala = (row[colRM] || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
    const key  = sala.replace(/^RM/, 'M');
    if (!key) continue;
    if (!map[key]) {
      const raw = (row[colMin] || '').replace(/[^\d.]/g, '');
      const min = raw !== '' ? parseFloat(raw) : NaN;
      const ts  = row[colTs] || '';
      map[key]  = { min, ts };
    }
    if (SALAS.every(s => map[s.key])) break;
  }
  return Object.keys(map).length > 0 ? map : null;
}

// ── COLOR ─────────────────────────────────────────────────
function getStyle(min) {
  if (isNaN(min) || min === null) return {
    borderColor: '#DDE2EF', badgeBg: '#F0F2F8', badgeColor: '#94A3B8',
    statusColor: '#94A3B8', statusLabel: 'Sin datos', valueColor: '#DDE2EF'
  };
  if (min < UMBRAL_VERDE) return {
    borderColor: '#2E7D51', badgeBg: '#E8F5EE', badgeColor: '#2E7D51',
    statusColor: '#2E7D51', statusLabel: 'Sin atraso', valueColor: '#1C2149'
  };
  if (min <= UMBRAL_AMARILLO) return {
    borderColor: '#8A6A00', badgeBg: '#FEF8E7', badgeColor: '#8A6A00',
    statusColor: '#8A6A00', statusLabel: 'Atraso moderado', valueColor: '#1C2149'
  };
  return {
    borderColor: '#B94040', badgeBg: '#FDECEA', badgeColor: '#B94040',
    statusColor: '#B94040', statusLabel: 'Atraso crítico', valueColor: '#1C2149'
  };
}

function formatTs(raw) {
  if (!raw) return null;
  const d = new Date(raw);
  if (isNaN(d)) return raw;
  return d.toLocaleString('es-CL', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ── RENDER ────────────────────────────────────────────────
function render(map) {
  const grid = document.getElementById('grid');

  if (!map) {
    grid.innerHTML = `<div class="error-box">
      <div style="font-size:24px;margin-bottom:12px">⚠</div>
      <div style="font-weight:600;color:#1C2149;margin-bottom:6px">No se pudo cargar la hoja</div>
      <div style="font-size:12px">Verifica que la hoja esté publicada en la web como CSV</div>
    </div>`;
    return;
  }

  let html = '';
  SALAS.forEach((s, i) => {
    const data  = map[s.key] || null;
    const min   = data ? data.min : NaN;
    const ts    = data ? formatTs(data.ts) : null;
    const st    = getStyle(isNaN(min) ? null : min);
    const disp  = isNaN(min) ? '—' : min;

    html += `
    <div class="card" style="border-left-color:${st.borderColor};animation-delay:${i*0.08}s">
      <div class="card-header">
        <div class="card-sala">${s.label}</div>
        <div class="badge" style="background:${st.badgeBg};color:${st.badgeColor}">${st.statusLabel}</div>
      </div>
      <div class="card-value-row">
        <div class="card-value" style="color:${st.valueColor}">${disp}</div>
        ${!isNaN(min) ? '<div class="card-unit">min</div>' : ''}
      </div>
      <div class="card-footer">
        <div class="card-status" style="color:${st.statusColor}">${st.statusLabel}</div>
        <div class="card-ts">${ts ? 'Actualizado: ' + ts : 'Sin datos recientes'}</div>
      </div>
    </div>`;
  });

  grid.innerHTML = html;

  const now = new Date().toLocaleTimeString('es-CL');
  document.getElementById('lastRead').innerHTML =
    `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#2E7D51;margin-right:8px;animation:pulse 2s ease-in-out infinite;vertical-align:middle"></span>` +
    `Última lectura: <strong style="color:#1C2149">${now}</strong>`;
}

// ── MAIN ──────────────────────────────────────────────────
async function refresh() {
  try {
    const text = await fetchCSV();
    const rows = parseCSV(text);
    const map  = buildMap(rows);
    render(map);
  } catch(e) {
    render(null);
    console.error(e);
  }
}

refresh();
</script>
</body>
</html>
